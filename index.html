<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Promo | Ofertas Amazon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .amazon-gradient { background: linear-gradient(135deg, #232f3e 0%, #37475a 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <header class="amazon-gradient p-6 text-white text-center shadow-lg">
        <h1 class="text-3xl font-extrabold tracking-tight">Mega Promo</h1>
        <p class="text-blue-300 mt-1 italic">As melhores escolhas selecionadas</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto p-4 md:p-6">
        
        <!-- Grid de Produtos -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Card Produto: Galaxy Watch Ultra -->
            <div class="bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden hover:shadow-xl transition-shadow duration-300">
                <div class="h-64 bg-gray-100 flex items-center justify-center overflow-hidden">
                    <img src="518YXVYcCRL._AC_.jpg" alt="Samsung Galaxy Watch Ultra" class="h-full w-full object-contain">
                </div>
                <div class="p-5">
                    <span class="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider">Oferta 60% OFF</span>
                    <h2 class="text-lg font-bold mt-2 text-gray-800">Galaxy Watch Ultra 2025</h2>
                    <p class="text-gray-600 text-sm mt-2 mb-4">47mm LTE, Galaxy AI, Titânio Aeroespacial. O smartwatch definitivo.</p>
                    <div class="mb-4 text-2xl font-black text-gray-900">R$ 1.999,00</div>
                    <a href="https://link.amazon/B0hzVDR0R" target="_blank" rel="nofollow noopener noreferrer" 
                       class="block w-full bg-[#FF9900] text-black text-center py-3 rounded-lg font-bold hover:bg-[#fa8900] transition">
                       Comprar
                    </a>
                </div>
            </div>

            <!-- DICA: Para adicionar novos produtos, basta copiar e colar o bloco "Card Produto" acima aqui -->

        </div>
    </main>

    <footer class="text-center p-10 text-gray-500 text-xs">
        Mega Promo &copy; 2026 - Seleção curada de ofertas.
    </footer>

</body>
</html>
